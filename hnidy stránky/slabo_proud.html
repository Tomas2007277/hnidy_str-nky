<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Revize | Zapojeno Elektro</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;

      background-image: url('./fotky/slabo_proud_fot1.jpeg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      color: #ffffff;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(40, 40, 40, 0.65);
      z-index: -1;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 40px;
      background: #000;
    }

    header img {
      height: 60px;
    }

    nav a {
      color: #ffffff;
      text-decoration: none;
      margin-left: 20px;
      font-weight: 600;
    }

    nav a:hover {
      color: #f5c400;
    }

    .content-wrapper {
      flex: 1;
      display: flex;
      align-items: flex-start;
      gap: 60px;
      max-width: 1200px;
      margin: 100px auto;
      padding: 0 40px;
    }

    section {
      flex: 1;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 20px;
    }

    h1 span {
      color: #f5c400;
    }

    p {
      font-size: 1.1rem;
      margin-bottom: 20px;
      line-height: 1.6;
      opacity: 0.9;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 25px;
      background: #f5c400;
      color: #000;
      text-decoration: none;
      font-weight: bold;
      border-radius: 8px;
      transition: 0.3s;
    }

    .btn:hover {
      background: #ffdd33;
    }

    .gallery {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
    }

    .gallery img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .gallery img:hover {
      transform: scale(1.05);
    }

    footer {
      padding: 20px;
      text-align: center;
      background: #0b0d12;
      font-size: 0.9rem;
      opacity: 0.7;
    }

    @media (max-width: 900px) {
      .content-wrapper {
        flex-direction: column;
      }
    }

    .lightbox {
      display: none;
      position: fixed;
      z-index: 999;
      padding-top: 60px;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.9);
    }

    .lightbox-content {
      margin: auto;
      display: block;
      max-width: 80%;
      max-height: 80%;
      border-radius: 10px;
    }

    .close {
      position: absolute;
      top: 20px;
      right: 40px;
      color: white;
      font-size: 40px;
      font-weight: bold;
      cursor: pointer;
    }

  </style>
</head>

<body>

<header>
  <a href="index.html">
    <img src="logo.png" alt="Zapojeno Elektro logo" style="cursor: pointer;">
</a>
  <nav>
    <a href="index.html">Domů</a>
    <a href="index.html#kontakt">Kontakt</a>
  </nav>
</header>

<div class="content-wrapper">

  <section>
    <h1><span>Slaboproudé</span> rozvody</h1>

    <p>
      Realizujeme rozvody internetu, televizního signálu, domácích telefonů a dalších slaboproudých systémů.
      Zajišťujeme přehledné a kvalitní provedení s možností budoucího rozšíření.
    </p>

    <a href="poptávka.html" class="btn">Nezávazná poptávka</a>
  </section>

</div>

<footer>
  © 2026 Zapojeno Elektro • Všechna práva vyhrazena
</footer>

<div id="lightbox" class="lightbox">
  <span class="close">&times;</span>
  <img class="lightbox-content" id="lightbox-img">
</div>

</body>
</html>
